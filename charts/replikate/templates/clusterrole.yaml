{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "replikate.fullname" . }}
  labels:
    {{- include "replikate.labels" . | nindent 4 }}
rules:
  # Replicate ConfigMaps and Secrets across namespaces.
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Discover target namespaces and react to new ones.
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  # Emit events for operator visibility.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Leader election.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
{{- end }}
