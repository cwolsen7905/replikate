replicaCount: 1

image:
  repository: ghcr.io/cwolsen7905/replikate
  # tag defaults to the chart's appVersion when left empty
  tag: ""
  pullPolicy: IfNotPresent

# Only needed if the GHCR package is private.
imagePullSecrets: []

# Annotation/label key prefix Replikate watches. Change this to reuse the
# controller under your own domain (sources are then annotated <domain>/sync).
annotationDomain: replikate.brainchurts.com

# Namespaces that never receive copies, regardless of a source's selector.
# Defaults protect the cluster's system namespaces; set to [] to exclude none.
excludeNamespaces:
  - kube-system
  - kube-public
  - kube-node-lease

leaderElection:
  enabled: true

serviceAccount:
  create: true
  name: ""

rbac:
  create: true

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

metrics:
  # A ClusterIP Service exposing the controller's Prometheus metrics.
  service:
    enabled: true
    port: 8080
  # A Prometheus Operator ServiceMonitor scraping that Service. Requires the
  # monitoring.coreos.com CRDs; leave disabled if the Operator isn't installed.
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: ""
    # Namespace to create the ServiceMonitor in (defaults to the release namespace).
    namespace: ""
    # Extra labels, e.g. to match your Prometheus serviceMonitorSelector.
    labels: {}

# PodDisruptionBudget for the controller. Only meaningful with replicaCount > 1
# and leaderElection enabled.
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1  # set instead of minAvailable

# Validating webhook that rejects a source whose sync-annotation selector does
# not parse, at apply time (instead of only logging it at reconcile). Requires
# cert-manager, which provisions the serving certificate and injects the CA
# bundle into the ValidatingWebhookConfiguration.
webhook:
  enabled: false
  # Container port the webhook server listens on.
  port: 9443
  # Fail rejects the apply when the webhook is unreachable; Ignore allows it.
  failurePolicy: Fail

# Scheduling priority for the controller pods.
priorityClassName: ""

podAnnotations: {}
nodeSelector: {}
tolerations: []
# Pod affinity/anti-affinity. To spread replicas across nodes, set a
# podAntiAffinity here keyed on the chart's selector labels.
affinity: {}
