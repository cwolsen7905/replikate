replicaCount: 1

image:
  repository: ghcr.io/cwolsen7905/replikate
  # tag defaults to the chart's appVersion when left empty
  tag: ""
  pullPolicy: IfNotPresent

# Only needed if the GHCR package is private.
imagePullSecrets: []

leaderElection:
  enabled: true

serviceAccount:
  create: true
  name: ""

rbac:
  create: true

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
